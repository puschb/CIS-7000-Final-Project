apiVersion: batch/v1
kind: Job
metadata:
  name: compute-norm-stats
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 7200  # 2 hours (should finish in minutes)
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: clone-repo
          image: alpine/git
          command:
            - sh
            - -c
            - |
              REPO_URL="https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/puschb/CIS-7000-Final-Project.git"
              git clone --depth 1 "$REPO_URL" /opt/repo
          env:
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: user
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: password
          volumeMounts:
            - name: repo
              mountPath: /opt/repo
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      containers:
        - name: compute
          image: puschb/aurora-dev:latest
          command:
            - sh
            - -c
            - |
              cd /opt/repo
              export PYTHONPATH=/opt/repo
              echo "=== Available data ==="
              ls /mnt/data/era5/2024/ 2>/dev/null | head -6 || echo "No 2024 dir"
              ls /mnt/data/era5/2025/ 2>/dev/null | head -6 || echo "No 2025 dir"
              echo ""
              echo "=== Computing normalisation stats (training split only) ==="
              python -u scripts/compute_norm_stats.py \
                --data-dir /mnt/data/era5/2024 /mnt/data/era5/2025
          volumeMounts:
            - name: repo
              mountPath: /opt/repo
            - name: data
              mountPath: /mnt/data
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
      volumes:
        - name: repo
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: era5-rechunked

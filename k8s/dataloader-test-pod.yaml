apiVersion: v1
kind: Pod
metadata:
  name: dataloader-test
spec:
  initContainers:
  - name: clone-repo
    image: alpine/git
    env:
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: user
    - name: GIT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: password
    args:
    - clone
    - --single-branch
    - --depth=1
    - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
    - /opt/repo
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
  containers:
  - name: test
    image: puschb/aurora-dev:latest
    command:
    - sh
    - -c
    - |
      cd /opt/repo
      export PYTHONPATH=/opt/repo
      echo "=== Files on PVC ==="
      ls -lh /mnt/data/era5/
      echo ""
      python -u scripts/test_dataloader.py --data-dir /mnt/data/era5
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
    - name: data
      mountPath: /mnt/data
    resources:
      requests:
        memory: 16Gi
        cpu: "4"
      limits:
        memory: 16Gi
        cpu: "4"
  volumes:
  - name: repo
    emptyDir: {}
  - name: data
    persistentVolumeClaim:
      claimName: era5-summer-data-many-connect
  restartPolicy: Never

# Indexed Job: convert all ERA5 atmospheric + surface files to per-hour NetCDF pairs.
#
# 42 completions (one per atmospheric chunk), parallelism 10.
# All output goes to /mnt/data/era5/per-step/ as a single flat directory tree
# (year-subdirs: per-step/2024/ and per-step/2025/) so ERA5Dataset with
# file_layout="per_timestep" can point at per-step/2024 and per-step/2025.
#
# Each pod skips its chunk if the expected output files already exist
# (idempotent / safe to re-run after failure).
#
# Usage:
#   kubectl -n upenn-dyer-lab create -f k8s/split-era5-to-per-timestep-job.yaml
#   kubectl -n upenn-dyer-lab logs -f job/split-era5-to-per-timestep --prefix=true
#   kubectl -n upenn-dyer-lab delete job split-era5-to-per-timestep
apiVersion: batch/v1
kind: Job
metadata:
  name: split-era5-to-per-timestep
spec:
  completionMode: Indexed
  completions: 42
  parallelism: 10
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - us-west
      initContainers:
        - name: clone-repo
          image: alpine/git
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: user
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: github-secret
                  key: password
          args:
            - clone
            - --single-branch
            - --depth=1
            - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
            - /opt/repo
          volumeMounts:
            - name: repo
              mountPath: /opt/repo
      containers:
        - name: split
          image: puschb/aurora-dev:latest
          command:
            - sh
            - -c
            - |
              set -e
              cd /opt/repo
              export PYTHONPATH=/opt/repo

              # ------------------------------------------------------------------
              # File table (index 0-41):
              #   0-9   : 2024 June chunks (d01-03 .. d28-30)
              #  10     : 2024 June d28-30 already included, see list
              #  10-20  : 2024 July chunks (d01-03 .. d31-31)
              #  21-30  : 2025 June chunks (d01-03 .. d28-30)
              #  31-41  : 2025 July chunks (d01-03 .. d31-31)
              # ------------------------------------------------------------------
              ATMOS_FILES=(
                "2024/2024-06-d01-03-atmospheric.nc"
                "2024/2024-06-d04-06-atmospheric.nc"
                "2024/2024-06-d07-09-atmospheric.nc"
                "2024/2024-06-d10-12-atmospheric.nc"
                "2024/2024-06-d13-15-atmospheric.nc"
                "2024/2024-06-d16-18-atmospheric.nc"
                "2024/2024-06-d19-21-atmospheric.nc"
                "2024/2024-06-d22-24-atmospheric.nc"
                "2024/2024-06-d25-27-atmospheric.nc"
                "2024/2024-06-d28-30-atmospheric.nc"
                "2024/2024-07-d01-03-atmospheric.nc"
                "2024/2024-07-d04-06-atmospheric.nc"
                "2024/2024-07-d07-09-atmospheric.nc"
                "2024/2024-07-d10-12-atmospheric.nc"
                "2024/2024-07-d13-15-atmospheric.nc"
                "2024/2024-07-d16-18-atmospheric.nc"
                "2024/2024-07-d19-21-atmospheric.nc"
                "2024/2024-07-d22-24-atmospheric.nc"
                "2024/2024-07-d25-27-atmospheric.nc"
                "2024/2024-07-d28-30-atmospheric.nc"
                "2024/2024-07-d31-31-atmospheric.nc"
                "2025/2025-06-d01-03-atmospheric.nc"
                "2025/2025-06-d04-06-atmospheric.nc"
                "2025/2025-06-d07-09-atmospheric.nc"
                "2025/2025-06-d10-12-atmospheric.nc"
                "2025/2025-06-d13-15-atmospheric.nc"
                "2025/2025-06-d16-18-atmospheric.nc"
                "2025/2025-06-d19-21-atmospheric.nc"
                "2025/2025-06-d22-24-atmospheric.nc"
                "2025/2025-06-d25-27-atmospheric.nc"
                "2025/2025-06-d28-30-atmospheric.nc"
                "2025/2025-07-d01-03-atmospheric.nc"
                "2025/2025-07-d04-06-atmospheric.nc"
                "2025/2025-07-d07-09-atmospheric.nc"
                "2025/2025-07-d10-12-atmospheric.nc"
                "2025/2025-07-d13-15-atmospheric.nc"
                "2025/2025-07-d16-18-atmospheric.nc"
                "2025/2025-07-d19-21-atmospheric.nc"
                "2025/2025-07-d22-24-atmospheric.nc"
                "2025/2025-07-d25-27-atmospheric.nc"
                "2025/2025-07-d28-30-atmospheric.nc"
                "2025/2025-07-d31-31-atmospheric.nc"
              )
              SURF_FILES=(
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-06-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2024/2024-07-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-06-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
                "2025/2025-07-surface.nc"
              )

              IDX=$JOB_COMPLETION_INDEX
              ATMOS_REL="${ATMOS_FILES[$IDX]}"
              SURF_REL="${SURF_FILES[$IDX]}"

              # Output goes to /mnt/data/era5/per-step/<year>/
              YEAR=$(echo "$ATMOS_REL" | cut -d'/' -f1)
              OUT=/mnt/data/era5/per-step/$YEAR
              mkdir -p "$OUT"

              # Static lives in the same year subdir as source; copy once per year.
              STATIC_SRC="/mnt/data/era5/${YEAR}/static.nc"
              STATIC_DST="$OUT/static.nc"
              if [ ! -f "$STATIC_DST" ]; then
                echo "Copying static -> $STATIC_DST"
                cp "$STATIC_SRC" "$STATIC_DST"
              fi

              echo "=== Index $IDX : $ATMOS_REL ==="
              python -u scripts/split_chunk_to_per_timestep.py \
                --atmos-src "/mnt/data/era5/$ATMOS_REL" \
                --surface-src "/mnt/data/era5/$SURF_REL" \
                --static-src "$STATIC_SRC" \
                --out-dir "$OUT"
          volumeMounts:
            - name: repo
              mountPath: /opt/repo
            - name: data
              mountPath: /mnt/data
          resources:
            requests:
              memory: 6Gi
              cpu: "1"
            limits:
              memory: 6Gi
              cpu: "1"
      volumes:
        - name: repo
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: era5-rechunked

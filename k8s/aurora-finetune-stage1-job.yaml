# Stage 1 short-lead-time fine-tuning job.
#
# Resources match the per-timestep dataloader benchmark that validated 12 workers:
#   - 12 CPUs  (1 per DataLoader worker, workers ≈ 4× faster than GPU can consume)
#   - 48 Gi RAM  (workers + val loader + model activations)
#   - 24 Gi /dev/shm  (PyTorch shared-memory IPC between workers and main process)
#   - 1× 48 GB GPU (L40, L40S, or RTX-A6000)
#
# Usage:
#   kubectl -n upenn-dyer-lab create -f k8s/aurora-finetune-stage1-job.yaml
#   kubectl -n upenn-dyer-lab logs -f job/aurora-finetune-stage1
#   kubectl -n upenn-dyer-lab delete job aurora-finetune-stage1
apiVersion: batch/v1
kind: Job
metadata:
  name: aurora-finetune-stage1
spec:
  backoffLimit: 1
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-A6000
      initContainers:
      - name: clone-repo
        image: alpine/git
        env:
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-secret
              key: user
        - name: GIT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: github-secret
              key: password
        args:
        - clone
        - --single-branch
        - --depth=1
        - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
        - /opt/repo
        volumeMounts:
        - name: repo
          mountPath: /opt/repo
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      containers:
      - name: aurora-finetune-stage1
        image: puschb/aurora-dev:latest
        env:
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "backend:cudaMallocAsync"
        command:
        - sh
        - -c
        - |
          set -e
          cd /opt/repo
          export PYTHONPATH=/opt/repo

          RUN_NAME="stage1_$(date -u +%Y%m%d_%H%M%S)"
          echo "=== Run: $RUN_NAME ==="
          nvidia-smi --query-gpu=name,memory.total --format=csv,noheader
          echo ""

          python -u -m src.finetune_stage1 \
            --data-dir /mnt/data/era5/per-step/2024 /mnt/data/era5/per-step/2025 \
            --run-dir  /mnt/data/runs \
            --run-name "$RUN_NAME" \
            --steps           3000 \
            --rollout-steps   1 \
            --warmup-steps    500 \
            --lr-base         5e-5 \
            --lr-new-embed    1e-3 \
            --weight-decay    5e-6 \
            --grad-clip       1.0 \
            --val-every       250 \
            --n-val-samples   50 \
            --save-every      500 \
            --num-workers     12 \
            --prefetch-factor 2
        volumeMounts:
        - name: repo
          mountPath: /opt/repo
        - name: data
          mountPath: /mnt/data
        - name: shm
          mountPath: /dev/shm
        resources:
          requests:
            memory: 48Gi
            cpu: "12"
            nvidia.com/gpu: "1"
          limits:
            memory: 48Gi
            cpu: "12"
            nvidia.com/gpu: "1"
      volumes:
      - name: repo
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: era5-rechunked
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 24Gi
      restartPolicy: Never

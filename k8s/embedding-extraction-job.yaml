# Extract Aurora embeddings from ERA5 data on A100 GPU.
# Reads ERA5 from era5-2025-pretrain PVC, writes embeddings + plots to embedding-results PVC.
#
# Prerequisites:
#   kubectl apply -f k8s/embedding-results-pvc.yaml
#
# Usage:
#   kubectl create -f k8s/embedding-extraction-job.yaml
#   kubectl logs -f job/embedding-extraction
#   kubectl delete job embedding-extraction
apiVersion: batch/v1
kind: Job
metadata:
  name: embedding-extraction
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 86400  # 24 hours
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB
      initContainers:
      - name: clone-repo
        image: alpine/git
        env:
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-secret
              key: user
        - name: GIT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: github-secret
              key: password
        args:
        - clone
        - --single-branch
        - --depth=1
        - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
        - /opt/repo
        volumeMounts:
        - name: repo
          mountPath: /opt/repo
      containers:
      - name: extract
        image: puschb/aurora-dev:latest
        command:
        - sh
        - -c
        - |
          cd /opt/repo
          nvidia-smi
          python -u scripts/extract_embeddings_tsne.py \
            --data-dir /mnt/data/era5 \
            --output-dir /mnt/results/embeddings
        volumeMounts:
        - name: repo
          mountPath: /opt/repo
        - name: era5-data
          mountPath: /mnt/data
        - name: results
          mountPath: /mnt/results
        resources:
          requests:
            memory: 64Gi
            cpu: "4"
            nvidia.com/a100: "1"
          limits:
            memory: 64Gi
            cpu: "4"
            nvidia.com/a100: "1"
      volumes:
      - name: repo
        emptyDir: {}
      - name: era5-data
        persistentVolumeClaim:
          claimName: era5-2025-pretrain
      - name: results
        persistentVolumeClaim:
          claimName: embedding-results
      restartPolicy: Never

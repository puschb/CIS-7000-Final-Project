apiVersion: v1
kind: Pod
metadata:
  name: aurora-data-shell
spec:
  restartPolicy: Never
  containers:
    - name: shell
      image: ubuntu:22.04
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /mnt/data
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "100m"
          memory: "256Mi"
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: aurora-data

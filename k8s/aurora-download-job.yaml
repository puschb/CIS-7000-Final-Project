apiVersion: batch/v1
kind: Job
metadata:
  name: aurora-download-era5
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: downloader
          image: puschb/aurora-dev:latest
          imagePullPolicy: Always
          command:
            - python
            - -c
            - |
              import os, cdsapi
              from pathlib import Path
              from datetime import datetime, timedelta

              out = Path("/mnt/data/era5")
              out.mkdir(parents=True, exist_ok=True)
              c = cdsapi.Client()

              start = datetime(2023, 1, 1)
              days = 10

              # Static (once)
              static = out / "static.nc"
              if not static.exists():
                  print("Downloading static variables...")
                  c.retrieve("reanalysis-era5-single-levels", {
                      "product_type": "reanalysis",
                      "variable": ["geopotential", "land_sea_mask", "soil_type"],
                      "year": "2023", "month": "01", "day": "01", "time": "00:00",
                      "format": "netcdf",
                  }, str(static))

              for i in range(days):
                  dt = start + timedelta(days=i)
                  y, m, d = str(dt.year), f"{dt.month:02d}", f"{dt.day:02d}"
                  ds = f"{y}-{m}-{d}"
                  print(f"[{i+1}/{days}] {ds}")

                  surf = out / f"{ds}-surface-level.nc"
                  if not surf.exists():
                      c.retrieve("reanalysis-era5-single-levels", {
                          "product_type": "reanalysis",
                          "variable": ["2m_temperature", "10m_u_component_of_wind",
                                        "10m_v_component_of_wind", "mean_sea_level_pressure"],
                          "year": y, "month": m, "day": d,
                          "time": ["00:00", "06:00", "12:00", "18:00"],
                          "format": "netcdf",
                      }, str(surf))
                  else:
                      print(f"  {surf.name} exists, skipping")

                  atm = out / f"{ds}-atmospheric.nc"
                  if not atm.exists():
                      c.retrieve("reanalysis-era5-pressure-levels", {
                          "product_type": "reanalysis",
                          "variable": ["temperature", "u_component_of_wind",
                                        "v_component_of_wind", "specific_humidity", "geopotential"],
                          "pressure_level": ["50","100","150","200","250","300",
                                              "400","500","600","700","850","925","1000"],
                          "year": y, "month": m, "day": d,
                          "time": ["00:00", "06:00", "12:00", "18:00"],
                          "format": "netcdf",
                      }, str(atm))
                  else:
                      print(f"  {atm.name} exists, skipping")

              print("\nDone. Listing files:")
              total = 0
              for f in sorted(out.glob("*.nc")):
                  sz = f.stat().st_size
                  total += sz
                  print(f"  {f.name:40s} {sz/1e6:8.1f} MB")
              print(f"  {'TOTAL':40s} {total/1e6:8.1f} MB")
          env:
            - name: CDSAPI_URL
              valueFrom:
                secretKeyRef:
                  name: cds-api-key
                  key: url
            - name: CDSAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: cds-api-key
                  key: key
          volumeMounts:
            - name: data
              mountPath: /mnt/data
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aurora-data

# GPU interactive pod (A100 80GB) for development.
# Clones repo at startup, drops you into a shell with everything ready.
#
# Usage:
#   bash scripts/k8s-interactive-gpu.sh
#   # or manually:
#   kubectl create -f k8s/aurora-interactive-pod.yaml
#   kubectl exec -it aurora-dev -- /bin/bash
#   kubectl delete pod aurora-dev
apiVersion: v1
kind: Pod
metadata:
  name: aurora-dev
spec:
  nodeSelector:
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
  initContainers:
  - name: clone-repo
    image: alpine/git
    env:
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: user
    - name: GIT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: password
    args:
    - clone
    - --single-branch
    - --depth=1
    - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
    - /opt/repo
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
  containers:
  - name: aurora-dev
    image: puschb/aurora-dev:latest
    command: ["sh", "-c", "cd /opt/repo && echo 'Ready — repo cloned, aurora installed.' && sleep infinity"]
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
    resources:
      requests:
        memory: 32Gi
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: 32Gi
        cpu: "4"
        nvidia.com/gpu: "1"
  volumes:
  - name: repo
    emptyDir: {}
  restartPolicy: Never

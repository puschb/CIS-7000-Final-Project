# GPU interactive pod (L40 48GB) for development.
# Clones repo at startup, drops you into a shell with everything ready.
#
# Usage:
#   kubectl create -f k8s/aurora-interactive-pod.yaml
#   kubectl exec -it aurora-dev -- /bin/bash
#   kubectl delete pod aurora-dev
apiVersion: v1
kind: Pod
metadata:
  name: aurora-dev
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-L40
  initContainers:
  - name: clone-repo
    image: alpine/git
    env:
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: user
    - name: GIT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: github-secret
          key: password
    args:
    - clone
    - --single-branch
    - --depth=1
    - https://$(GIT_USERNAME):$(GIT_PASSWORD)@github.com/puschb/CIS-7000-Final-Project.git
    - /opt/repo
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
  containers:
  - name: aurora-dev
    image: puschb/aurora-dev:latest
    command: ["sh", "-c", "echo \"url: $CDS_URL\nkey: $CDS_KEY\" > ~/.cdsapirc && cd /opt/repo && echo 'Ready — repo cloned, aurora installed.' && sleep infinity"]
    env:
    - name: CDS_URL
      valueFrom:
        secretKeyRef:
          name: cds-api-key
          key: url
    - name: CDS_KEY
      valueFrom:
        secretKeyRef:
          name: cds-api-key
          key: key
    volumeMounts:
    - name: repo
      mountPath: /opt/repo
    - name: data
      mountPath: /mnt/data
    resources:
      requests:
        memory: 32Gi
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: 32Gi
        cpu: "4"
        nvidia.com/gpu: "1"
  volumes:
  - name: repo
    emptyDir: {}
  - name: data
    persistentVolumeClaim:
      claimName: era5-rechunked
  restartPolicy: Never
